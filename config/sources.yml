project:
  name: uew-rag-export
  output_directory: public
  user_agent: "UEW-RAG-Exporter/1.0"
  timeout_seconds: 30
  request_delay_seconds: 1
  max_concurrency: 2

export:
  include_raw_html: true
  include_clean_text: true
  include_acf: true
  extract_links: true
  collect_media_metadata: true

  document_mime_types:
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/vnd.ms-powerpoint
    - application/vnd.openxmlformats-officedocument.presentationml.presentation
    - application/vnd.ms-excel
    - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet

sources:
  - id: transfer-wiedzy
    name: Transfer Wiedzy
    base_url: https://transferwiedzy.uew.pl
    priority: C
    enabled: true
    required: true
    adapter: wordpress
    content_types:
      - posts
      - pages

  - id: uew
    name: Główny portal UEW
    base_url: https://uew.pl
    priority: A
    enabled: true
    required: true
    adapter: wordpress
    content_types:
      - posts
      - pages
      - mec-events
      - units

  - id: rekrutacja
    name: Rekrutacja UEW
    base_url: https://rekrutacja.uew.pl
    priority: A
    enabled: true
    required: true
    adapter: wordpress
    content_types:
      - posts
      - pages
      - courses_of_study

  - id: bon
    name: Biuro Obsługi Osób z Niepełnosprawnościami
    base_url: https://bon.uew.pl
    priority: A
    enabled: true
    required: true
    adapter: wordpress
    content_types:
      - posts
      - pages

  - id: szkola-doktorska
    name: Szkoła Doktorska
    base_url: https://sd.uew.pl
    priority: A
    enabled: true
    required: true
    adapter: wordpress
    content_types:
      - posts
      - pages

  - id: international
    name: International UEW
    base_url: https://international.uew.pl
    priority: A
    enabled: false
    required: false
    adapter: wordpress
    content_types:
      - posts
      - pages
