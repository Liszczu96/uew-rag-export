name: Inventory UEW WordPress sources

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Uruchom inwentaryzację
        run: python scripts/inventory_sources.py

      - name: Zapisz wynik w repozytorium
        run: |
          git config user.name "uew-rag-export-bot"
          git config user.email "actions@users.noreply.github.com"

          git add public/source-inventory.json

          if git diff --cached --quiet; then
            echo "Brak zmian do zapisania."
          else
            git commit -m "Update WordPress source inventory"
            git push
          fi
