name: Export UEW RAG content

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uew-rag-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v6

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Sprawdź składnię eksportera
        run: python -m py_compile scripts/export_sources.py

      - name: Uruchom eksport treści
        run: python scripts/export_sources.py

      - name: Pokaż podsumowanie
        run: |
          echo "===== STATUS ====="
          cat public/status.json

          echo ""
          echo "===== BŁĘDY ====="
          cat public/errors.json

      - name: Zapisz wyniki w repozytorium
        run: |
          git config user.name "uew-rag-export-bot"
          git config user.email "actions@users.noreply.github.com"

          git add \
            public/rag \
            public/sites \
            public/status.json \
            public/errors.json \
            public/manifest.json

          if git diff --cached --quiet; then
            echo "Brak zmian do zapisania."
          else
            git commit -m "Update UEW RAG content export"
            git push
          fi
