name: Export UEW RAG content

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uew-rag-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v6

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Sprawdź składnię eksportera
        run: python -m py_compile scripts/export_sources.py

      - name: Uruchom eksport treści
        run: |
          set +e
          python scripts/export_sources.py
          exit_code=$?
          echo "$exit_code" > /tmp/export_exit_code
          exit 0

      - name: Pokaż podsumowanie
        if: always()
        run: |
          echo "===== STATUS ====="

          if [ -f public/status.json ]; then
            cat public/status.json
          else
            echo "Brak public/status.json"
          fi

          echo ""
          echo "===== BŁĘDY ====="

          if [ -f public/errors.json ]; then
            cat public/errors.json
          else
            echo "Brak public/errors.json"
          fi

      - name: Zapisz wyniki w repozytorium
        if: always()
        run: |
          git config user.name "uew-rag-export-bot"
          git config user.email "actions@users.noreply.github.com"

          export_status="$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("public/status.json")

          if not path.exists():
              print("missing")
          else:
              status = json.loads(path.read_text(encoding="utf-8"))
              print(status.get("export_status", "unknown"))
          PY
          )"

          echo "Status eksportu: $export_status"

          if [ "$export_status" = "ok" ]; then
            git add \
              public/rag \
              public/sites \
              public/status.json \
              public/errors.json \
              public/manifest.json \
              public/changes/source-export-changes.jsonl
          else
            git add \
              public/status.json \
              public/errors.json \
              public/manifest.json
          fi

          if git diff --cached --quiet; then
            echo "Brak zmian do zapisania."
          else
            git commit -m "Update UEW RAG content export"
            git push
          fi

      - name: Sprawdź wynik eksportu
        if: always()
        run: |
          exit_code="$(cat /tmp/export_exit_code 2>/dev/null || echo 1)"

          if [ "$exit_code" -ne 0 ]; then
            echo "Eksport zakończył się błędem."
            exit "$exit_code"
          fi

          echo "Eksport zakończył się poprawnie."
