name: Audit UEW attachment extraction

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uew-attachment-extraction-audit
  cancel-in-progress: false

jobs:
  audit-extraction:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v6

      - name: Ustaw Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sprawdź składnię skryptu
        run: python -m py_compile scripts/audit_attachment_extraction.py

      - name: Wykonaj końcowy audyt
        run: python scripts/audit_attachment_extraction.py

      - name: Pokaż raport
        if: always()
        run: |
          echo "===== AUDYT EKSTRAKCJI ====="

          if [ -f public/attachment-extraction-audit.json ]; then
            cat public/attachment-extraction-audit.json
          else
            echo "Raport audytu nie został utworzony."
          fi

      - name: Zapisz wyniki audytu
        if: always()
        run: |
          git config user.name "uew-rag-export-bot"
          git config user.email "actions@users.noreply.github.com"

          git add \
            public/attachment-extraction-audit.json \
            public/rag/attachment-extraction-audit-issues.jsonl \
            public/rag/attachment-ocr-queue.jsonl

          if git diff --cached --quiet; then
            echo "Brak zmian do zapisania."
          else
            git commit -m "Audit UEW attachment extraction"
            git push
          fi
